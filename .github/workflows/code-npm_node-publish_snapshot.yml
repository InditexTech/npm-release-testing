---
name: code-npm-publish-snapshot
run-name: "Publish snapshot: ${{ github.event.issue.title }}"

concurrency: code-publish-snapshot-${{ github.ref }}

on:
  issue_comment:
    types: [created]

jobs:
  prepare-and-publish-snapshot:
    name: Prepare and Publish Snapshot
    if: >
      github.event.issue.pull_request != null &&
      github.event.comment.body == '/publish-snapshot'
    runs-on: ubuntu-24.04
    outputs:
      snapshot_version: ${{ steps.define-version.outputs.snapshot_version }}
      release_labels: ${{ steps.get-params.outputs.release_labels }}
      pr_ref: ${{ steps.get-params.outputs.pr_ref }}
      release_type: ${{ steps.determine-type.outputs.release_type }}
    steps:
      - name: Validate admin permissions
        id: permission-check
        uses: actions/github-script@v7
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor
            });

            const permission = data.permission;
            core.info(`User permission level: ${permission}`);

            if (permission !== 'admin') {
              core.setFailed(`User @${context.actor} is not a repository admin.`);
            }

      - name: Get input parameters
        id: get-params
        run: |
          RELEASE_LABELS="${{ join(github.event.issue.labels.*.name, ', ') }}"
          if [[ $RELEASE_LABELS != *release-type/* ]]; then
            RELEASE_LABELS="$RELEASE_LABELS, release-type/minor"
          fi
          echo "release_labels=$RELEASE_LABELS" >> "$GITHUB_OUTPUT"
          echo "pr_ref=refs/pull/${{ github.event.issue.number }}/head" >> "$GITHUB_OUTPUT"

      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.issue.number }}/head
          fetch-depth: 0
          persist-credentials: false

      - name: Determine release type
        id: determine-type
        env:
          RELEASE_LABELS: ${{ steps.get-params.outputs.release_labels }}
        run: |
          if [[ "$RELEASE_LABELS" == *"release-type/hotfix"* ]] || [[ "$RELEASE_LABELS" == *"release-type/multi-hotfix"* ]] || [[ "$RELEASE_LABELS" == *"release-type/patch"* ]]; then
            echo "release_type=patch" >> "$GITHUB_OUTPUT"
          elif [[ "$RELEASE_LABELS" == *"release-type/major"* ]]; then
            echo "release_type=major" >> "$GITHUB_OUTPUT"
          else
            echo "release_type=minor" >> "$GITHUB_OUTPUT"
          fi

      - name: Update CHANGELOG.md
        id: update-changelog
        uses: release-flow/keep-a-changelog-action@v3.0.0
        with:
          command: bump
          version: ${{ steps.determine-type.outputs.release_type }}
          changelog: code/CHANGELOG.md
          fail-on-empty-release-notes: false
          keep-unreleased-section: true
          tag-prefix: ""

      - name: Define snapshot version
        id: define-version
        env:
          RELEASE_VERSION: ${{ steps.update-changelog.outputs.version }}
        run: |
          CLEAN_VERSION=$(echo "$RELEASE_VERSION" | sed -E 's/-.*$//')
          SNAPSHOT_VERSION="${CLEAN_VERSION}-SNAPSHOT.${{ github.run_number }}.${{ github.run_attempt }}"
          echo "snapshot_version=$SNAPSHOT_VERSION" >> "$GITHUB_OUTPUT"

  publish-snapshot:
    name: Publish Snapshot to NPM
    needs: prepare-and-publish-snapshot
    uses: ./.github/workflows/code-npm_node-publish-reusable-PROPOSED.yml
    with:
      publish-type: SNAPSHOT
      checkout-ref: ${{ needs.prepare-and-publish-snapshot.outputs.pr_ref }}
      release-version: ${{ needs.prepare-and-publish-snapshot.outputs.snapshot_version }}
      commit-message-prefix: "chore: prepare snapshot version"
      push-ref: ${{ needs.prepare-and-publish-snapshot.outputs.pr_ref }}
      working-directory: code
      asdf-version: "0.18.0"
    secrets: inherit

  comment-result:
    name: Comment on PR
    needs: [prepare-and-publish-snapshot, publish-snapshot]
    if: always()
    runs-on: ubuntu-24.04
    steps:
      - name: Result / Comment on PR
        uses: actions/github-script@v7
        env:
          SNAPSHOT_VERSION: ${{ needs.prepare-and-publish-snapshot.outputs.snapshot_version }}
          PUBLISH_STATUS: ${{ needs.publish-snapshot.result }}
        with:
          script: |
            const status = process.env.PUBLISH_STATUS;
            const version = process.env.SNAPSHOT_VERSION;

            const body = status === 'success'
              ? [
                  "✅ Pre-release published successfully.",
                  "",
                  `- Version: \`${version}\``,
                  "- Tag: \`next\`"
                ]
              : [
                  "❌ Pre-release publish failed.",
                  "",
                  "Please check the workflow logs for details."
                ]

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body.join("\n")
            });
