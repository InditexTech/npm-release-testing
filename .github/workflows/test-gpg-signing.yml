---
name: Test GPG Signing
run-name: "Test GPG signing: ${{ github.actor }}"

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-gpg-signing:
    name: Test GPG Commit & Tag Signing
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Import GPG key and configure signing
        env:
          GPG_PRIVATE_KEY: ${{ secrets.CI_GPG_SECRET_KEY }}
          GPG_PASSPHRASE: ${{ secrets.CI_GPG_SECRET_KEY_PASSWORD }}
        run: |
          echo "=== Verify secrets are populated ==="
          [ -n "$GPG_PRIVATE_KEY" ] && echo "CI_GPG_SECRET_KEY: SET" || { echo "::error::CI_GPG_SECRET_KEY is EMPTY"; exit 1; }
          [ -n "$GPG_PASSPHRASE" ] && echo "CI_GPG_SECRET_KEY_PASSWORD: SET" || echo "::warning::CI_GPG_SECRET_KEY_PASSWORD is EMPTY (key may have no passphrase)"

          echo ""
          echo "=== Configure gpg-agent and gpg for non-interactive signing ==="
          mkdir -p ~/.gnupg && chmod 700 ~/.gnupg
          printf 'allow-loopback-pinentry\nallow-preset-passphrase\n' > ~/.gnupg/gpg-agent.conf
          printf 'use-agent\npinentry-mode loopback\n' > ~/.gnupg/gpg.conf
          gpgconf --kill gpg-agent || true

          echo ""
          echo "=== Import GPG private key ==="
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import

          echo ""
          echo "=== Pre-seed passphrase in gpg-agent for all keygrips ==="
          KEY_DATA=$(gpg --list-secret-keys --with-colons)
          echo "$KEY_DATA" | awk -F: '/^grp:/ {print $10}' | while read -r GRIP; do
            /usr/lib/gnupg/gpg-preset-passphrase --preset "$GRIP" <<< "$GPG_PASSPHRASE"
          done
          echo "Passphrase cached for all keygrips"

      - name: Configure git for GPG signing
        run: |
          KEY_DATA=$(gpg --list-secret-keys --with-colons)
          FPR=$(echo "$KEY_DATA" | awk -F: '/^fpr:/ {print $10; exit}')
          echo "Using signing key fingerprint: $FPR"

          git config user.name "srvcosoitxtech"
          git config user.email "oso@inditex.com"
          git config user.signingkey "$FPR"
          git config commit.gpgsign true
          git config tag.gpgsign true

      - name: Create signed commit and verify
        run: |
          echo "gpg-test-$(date +%s)" >> gpg-test-file.txt
          git add gpg-test-file.txt
          git commit -m "test: GPG signed commit" -S --no-verify

          echo ""
          echo "=== Verify commit signature ==="
          git verify-commit HEAD

      - name: Create signed tag and verify
        run: |
          TAG_NAME="gpg-test-tag-${{ github.run_number }}"
          git tag -s -m "test: GPG signed tag" "$TAG_NAME"

          echo ""
          echo "=== Verify tag signature ==="
          git verify-tag "$TAG_NAME"

      - name: Verify GPG key is uploaded to GitHub
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          KEY_ID=$(gpg --list-secret-keys --keyid-format long --with-colons | awk -F: '/^sec:/ {print $5; exit}')
          COMMITTER_USER="srvcosoitxtech"

          echo "=== Checking if key $KEY_ID is registered on GitHub user $COMMITTER_USER ==="
          GITHUB_KEYS=$(gh api "/users/$COMMITTER_USER/gpg_keys" --jq '.[].key_id')

          if echo "$GITHUB_KEYS" | grep -q "$KEY_ID"; then
            echo "Key $KEY_ID found on GitHub user $COMMITTER_USER"
          else
            echo "::error::Key $KEY_ID NOT found on GitHub user $COMMITTER_USER. Commits will appear as Unverified."
            echo "Available keys on $COMMITTER_USER: $GITHUB_KEYS"
            exit 1
          fi

      - name: Summary
        if: always()
        run: |
          echo "## GPG Signing Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          UID_LINE=$(gpg --list-secret-keys --with-colons | awk -F: '/^uid:/ {print $10; exit}')
          KEY_ID=$(gpg --list-secret-keys --keyid-format long --with-colons | awk -F: '/^sec:/ {print $5; exit}')
          echo "### Key Info" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Identity:** \`$UID_LINE\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Key ID:** \`$KEY_ID\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if git verify-commit HEAD 2>/dev/null; then
            echo "- :white_check_mark: Verified commit: **PASS**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- :x: Verified commit: **FAIL**" >> "$GITHUB_STEP_SUMMARY"
          fi

          TAG_NAME="gpg-test-tag-${{ github.run_number }}"
          if git verify-tag "$TAG_NAME" 2>/dev/null; then
            echo "- :white_check_mark: Verified tag: **PASS**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- :x: Verified tag: **FAIL**" >> "$GITHUB_STEP_SUMMARY"
          fi

          COMMITTER_USER="srvcosoitxtech"
          GITHUB_KEYS=$(gh api "/users/$COMMITTER_USER/gpg_keys" --jq '.[].key_id' 2>/dev/null || echo "")
          if echo "$GITHUB_KEYS" | grep -q "$KEY_ID"; then
            echo "- :white_check_mark: GPG key on GitHub ($COMMITTER_USER): **PASS**" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- :x: GPG key on GitHub ($COMMITTER_USER): **NOT FOUND**" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "> No push was performed. All changes are local to the runner." >> "$GITHUB_STEP_SUMMARY"
