---
name: Test GPG Signing
run-name: "Test GPG signing: ${{ github.actor }}"

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-gpg-signing:
    name: Test GPG Commit & Tag Signing
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure gpg-agent
        run: |
          mkdir -p ~/.gnupg
          chmod 700 ~/.gnupg
          cat > ~/.gnupg/gpg-agent.conf << 'AGENTEOF'
          allow-loopback-pinentry
          allow-preset-passphrase
          AGENTEOF
          cat > ~/.gnupg/gpg.conf << 'GPGEOF'
          use-agent
          pinentry-mode loopback
          GPGEOF
          gpgconf --kill gpg-agent
          gpgconf --launch gpg-agent

      - name: Import GPG key
        env:
          GPG_PRIVATE_KEY: ${{ secrets.CI_GPG_SECRET_KEY }}
          GPG_KEY_ID: ${{ secrets.CI_GPG_KEY_ID }}
          GPG_PASSPHRASE: ${{ secrets.CI_GPG_SECRET_KEY_PASSWORD }}
        run: |
          echo "::group::Debug - check secrets are set"
          [ -n "$GPG_PRIVATE_KEY" ] && echo "CI_GPG_SECRET_KEY: SET (${#GPG_PRIVATE_KEY} chars)" || echo "CI_GPG_SECRET_KEY: EMPTY"
          [ -n "$GPG_KEY_ID" ] && echo "CI_GPG_KEY_ID: SET" || echo "CI_GPG_KEY_ID: EMPTY"
          [ -n "$GPG_PASSPHRASE" ] && echo "CI_GPG_SECRET_KEY_PASSWORD: SET (${#GPG_PASSPHRASE} chars)" || echo "CI_GPG_SECRET_KEY_PASSWORD: EMPTY"
          echo "::endgroup::"

          echo "::group::Import GPG private key"
          echo "$GPG_PRIVATE_KEY" | gpg --batch --import
          echo "::endgroup::"

          echo "::group::GPG key info"
          gpg --list-keys
          gpg --list-secret-keys --with-keygrip
          echo "::endgroup::"

          echo "::group::Test GPG signing (standalone via stdin passphrase)"
          echo "test" | gpg --batch --yes --pinentry-mode loopback \
            --passphrase-fd 3 --clearsign 3<<< "$GPG_PASSPHRASE"
          echo "::endgroup::"

          echo "::group::Pre-seed passphrase in gpg-agent"
          KEYGRIP=$(gpg --list-secret-keys --with-keygrip 2>/dev/null \
            | grep -A1 '^\s*sec' | grep Keygrip | awk '{print $3}' | head -1)
          echo "Using keygrip: $KEYGRIP"
          /usr/lib/gnupg/gpg-preset-passphrase --preset "$KEYGRIP" <<< "$GPG_PASSPHRASE"
          echo "Passphrase pre-seeded in gpg-agent"
          echo "::endgroup::"

      - name: Configure git for GPG signing
        env:
          GPG_KEY_ID: ${{ secrets.CI_GPG_KEY_ID }}
        run: |
          git config user.name "InditexTech CI"
          git config user.email "oso@inditex.com"
          git config commit.gpgsign true
          git config tag.gpgsign true
          git config user.signingkey "$GPG_KEY_ID"
          git config gpg.program gpg

          echo "::group::Git GPG config"
          git config --list | grep -E '(gpg|sign|user\.)'
          echo "::endgroup::"

      - name: Test signed commit
        run: |
          echo "gpg-test-$(date +%s)" >> gpg-test-file.txt
          git add gpg-test-file.txt
          git commit -m "test: GPG signed commit" \
            -S --no-verify
          echo "::group::Verify signed commit"
          git log --show-signature -1
          echo "::endgroup::"

      - name: Test signed tag
        run: |
          git tag -s -m "test: GPG signed tag" gpg-test-tag-${{ github.run_number }}
          echo "::group::Verify signed tag"
          git tag -v gpg-test-tag-${{ github.run_number }}
          echo "::endgroup::"

      - name: Summary
        if: always()
        run: |
          echo "## GPG Signing Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if git log --show-signature -1 2>&1 | grep -q "Good signature"; then
            echo "- Signed commit: PASS" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Signed commit: FAIL" >> "$GITHUB_STEP_SUMMARY"
          fi

          if git tag -v gpg-test-tag-${{ github.run_number }} 2>&1 | grep -q "Good signature"; then
            echo "- Signed tag: PASS" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Signed tag: FAIL" >> "$GITHUB_STEP_SUMMARY"
          fi

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Note:** No push was performed. All changes are local to the runner." >> "$GITHUB_STEP_SUMMARY"
