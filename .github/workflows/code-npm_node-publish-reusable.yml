---
name: code-npm-publish-reusable-enhanced

on:
  workflow_call:
    inputs:
      publish-type:
        description: "Type of publish operation: RELEASE or SNAPSHOT"
        required: true
        type: string
      checkout-ref:
        description: "Git ref to checkout for initial setup (branch, tag, SHA, or PR ref)"
        required: true
        type: string
      release-version:
        description: "Exact version to use for release"
        required: true
        type: string
      working-directory:
        description: "Working directory where npm commands will be executed"
        required: false
        type: string
        default: "code"
      asdf-version:
        description: "ASDF version to use"
        required: false
        type: string
        default: "0.18.0"
    outputs:
      final_version:
        description: "Final version prepared for release/snapshot"
        value: ${{ jobs.prepare-and-publish.outputs.final_version }}

permissions:
  id-token: write
  contents: read

jobs:
  prepare-and-publish:
    name: Prepare and Publish ${{ inputs.publish-type }}
    runs-on: ubuntu-24.04
    env:
      ASDF_BRANCH_VERSION: ${{ inputs.asdf-version }}
    outputs:
      final_version: ${{ steps.get-final-version.outputs.final_version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.checkout-ref }}
          fetch-depth: 0
          persist-credentials: false

      - name: Setup asdf Cache
        id: asdf-cache
        uses: actions/cache@v4
        continue-on-error: true
        with:
          path: ~/.asdf
          key: ${{ runner.os }}-asdf-${{ env.ASDF_BRANCH_VERSION }}-${{ hashFiles(format('{0}/.tool-versions', inputs.working-directory)) }}

      - name: Save tool-versions content
        run: |
          {
            echo "TOOL_VERSIONS<<EOF"
            cat ${{ inputs.working-directory }}/.tool-versions
            echo "EOF"
          } >> "$GITHUB_ENV"

      - name: Setup asdf environment
        uses: asdf-vm/actions/install@1902764435ca0dd2f3388eea723a4f92a4eb8302 # v4.0.0
        if: steps.asdf-cache.outputs.cache-hit != 'true'
        with:
          tool_versions: ${{ env.TOOL_VERSIONS }}
          asdf_version: ${{ env.ASDF_BRANCH_VERSION }}

      - name: NPM / Set npmrc
        env:
          NPM_AUTH: ${{ secrets.NPM_TOKEN }}
          NPM_REGISTRY: "https://registry.npmjs.org/"
        run: |
          echo "registry=${NPM_REGISTRY}" >> /home/runner/.npmrc
          echo "@inditextech:registry=${NPM_REGISTRY}" >> /home/runner/.npmrc
          echo "//registry.npmjs.org/:_authToken=${NPM_AUTH}" >> /home/runner/.npmrc
          echo "always-auth=true" >> /home/runner/.npmrc

      - name: NPM / Create Cache Folders
        run: |
          mkdir -p "$HOME"/.npm

      - name: NPM / Setup Dependencies Cache
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-node-${{ hashFiles(format('{0}/package-lock.json', inputs.working-directory)) }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Set release version
        id: get-final-version
        run: |
          echo "final_version=${{ inputs.release-version }}" >> "$GITHUB_OUTPUT"
          echo "FINAL_VERSION=${{ inputs.release-version }}" >> "$GITHUB_ENV"

      - name: NPM / Prepare release
        working-directory: ${{ inputs.working-directory }}
        env:
          RELEASE_VERSION: ${{ steps.get-final-version.outputs.final_version }}
        run: |
          npm run version:release
          npm run release:prepare

      - name: NPM / Publish Release
        if: inputs.publish-type == 'RELEASE'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: ${{ inputs.working-directory }}
        run: |
          npm run release:perform

      - name: NPM / Publish Snapshot
        if: inputs.publish-type == 'SNAPSHOT'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        working-directory: ${{ inputs.working-directory }}
        run: |
          npm run publish:snapshot
