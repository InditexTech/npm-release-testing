---
name: code-npm-publish-reusable

on:
  workflow_call:
    inputs:
      publish-type:
        description: "Type of publish operation: RELEASE or SNAPSHOT"
        required: true
        type: string
    secrets:
      GITHUB_TOKEN:
        description: "GitHub token"
        required: false
      NPM_TOKEN:
        description: "npm access token — not required when OIDC Trusted Publishers is configured"
        required: false

# Required for npm OIDC Trusted Publishers.
# This workflow must be registered in npmjs.com under each package's
# "Trusted Publishers" settings so that OIDC-based authentication works.
permissions:
  id-token: write # Required for OIDC
  contents: read

jobs:
  publish:
    name: Publish to NPM
    runs-on: ubuntu-24.04
    steps:
      - name: Download packages artifact
        uses: actions/download-artifact@v4
        with:
          name: npm-${{ inputs.publish-type == 'RELEASE' && 'release' || 'snapshot' }}-packages-${{ github.run_id }}
          path: /tmp/npm-packages

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22.17.1"
          registry-url: "https://registry.npmjs.org"

      - name: NPM / Release Perform - Distribution Platform
        if: inputs.publish-type == 'RELEASE'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for tarball in /tmp/npm-packages/*.tgz; do
            npm publish "$tarball" --provenance --access public
          done

      - name: NPM / Publish Snapshot - Distribution Platform
        if: inputs.publish-type == 'SNAPSHOT'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          for tarball in /tmp/npm-packages/*.tgz; do
            npm publish "$tarball" --provenance --access public --tag next
          done
